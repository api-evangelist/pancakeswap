name: PancakeSwap
description: >
  PancakeSwap is the largest decentralized exchange (DEX) on BNB Chain, operating
  across ten blockchains including Ethereum, Arbitrum, Base, Solana, zkSync, Linea,
  Polygon zkEVM, opBNB, and Aptos. It provides REST and GraphQL APIs for accessing
  token prices, liquidity pool data, swap routing, farm yields, trading pair statistics,
  NFT market data, and prediction markets. Developers can query on-chain data via
  hosted subgraphs on The Graph Protocol and NodeReal.
image: https://pancakeswap.finance/logo.png
tags:
  - DeFi
  - DEX
  - BNB Chain
  - Decentralized Exchange
  - Blockchain
  - Swap
  - Liquidity
  - Yield Farming
  - NFT
  - Web3
